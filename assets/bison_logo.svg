<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 240" width="300" height="240" aria-label="Bison head logo">
  <defs>
    <linearGradient id="humpatGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B6F47;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#6B5437;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4A3728;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="faceGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2C1810;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A0F08;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Back hump/shoulder - main body -->
  <ellipse cx="80" cy="60" rx="65" ry="85" fill="url(#humpatGradient)" opacity="0.95"/>
  
  <!-- Hump detail shading layer 1 -->
  <path d="M 60 40 Q 75 30 95 45 Q 100 50 95 70 Q 85 80 65 75 Z" fill="#7A5F3F" opacity="0.6"/>
  
  <!-- Hump detail shading layer 2 -->
  <path d="M 85 25 Q 105 20 115 50 Q 110 60 95 55 Z" fill="#5A4829" opacity="0.5"/>

  <!-- Neck connecting section -->
  <path d="M 130 100 Q 155 95 170 130 L 165 150 Q 140 145 135 120 Z" fill="#3D2817" opacity="0.9"/>

  <!-- Head upper muzzle profile (dark) -->
  <ellipse cx="185" cy="110" rx="45" ry="50" fill="url(#faceGradient)"/>
  
  <!-- Muzzle/jaw (very dark) -->
  <ellipse cx="215" cy="135" rx="35" ry="38" fill="#1A0F08"/>
  
  <!-- Face midtone area -->
  <ellipse cx="220" cy="125" rx="20" ry="25" fill="#3C2414" opacity="0.8"/>
  
  <!-- Horn - curves upward -->
  <g>
    <path d="M 175 80 Q 165 50 168 20 Q 170 10 178 12 Q 182 45 185 75 Z" fill="#2A1810" stroke="#1A0F08" stroke-width="1"/>
    <path d="M 176 78 Q 169 55 171 25" stroke="#4A3728" stroke-width="1.5" fill="none" opacity="0.6"/>
  </g>

  <!-- Eye -->
  <circle cx="195" cy="105" r="7" fill="#1C0E06"/>
  <circle cx="197" cy="103" r="2.5" fill="#F5E6D3" opacity="0.9"/>
  
  <!-- Nostril -->
  <ellipse cx="235" cy="138" rx="3" ry="2.5" fill="#0F0704"/>
  
  <!-- Mouth/jaw line -->
  <path d="M 235 145 Q 245 148 255 145" stroke="#1A0F08" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Forehead wrinkle texture -->
  <path d="M 180 85 Q 185 75 192 80" stroke="#4A3728" stroke-width="1" fill="none" opacity="0.5"/>
  <path d="M 185 90 Q 190 80 198 85" stroke="#5A4829" stroke-width="0.8" fill="none" opacity="0.4"/>

  <!-- Chin/beard hair strands -->
  <g opacity="0.7">
    <path d="M 215 155 Q 218 165 215 172" stroke="#1A0F08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M 225 160 Q 228 170 225 178" stroke="#1A0F08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M 235 158 Q 238 168 235 175" stroke="#1A0F08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
    <path d="M 245 155 Q 248 165 245 172" stroke="#1A0F08" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Shoulder muscle definition -->
  <path d="M 110 140 Q 120 155 130 165" stroke="#5A4829" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>

  <!-- Shadow under hump for depth -->
  <ellipse cx="110" cy="155" rx="50" ry="25" fill="#3D2817" opacity="0.3"/>
</svg>
